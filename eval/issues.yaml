# =============================================================================
# Mechanic — Eval Issue Manifest (v1)
# =============================================================================
# Ground-truth benchmark for the autonomous code-repair agent.
# 15 open, real GitHub issues across 10 small/medium Python libraries.
#
# REPRODUCIBILITY DISCIPLINE (read before using):
#   1. base_commit MUST be pinned before any eval run. It is null until you run
#      the setup/pin step, which clones each repo and records the default-branch
#      HEAD SHA here. Pinning matters because the upstream bug may be fixed at any
#      time; the eval must run against a frozen commit that still exhibits it.
#   2. repro_verified MUST be flipped to true ONLY after you have personally run
#      the failing test against base_commit and confirmed it FAILS. An issue can
#      be "open" yet already silently patched on HEAD (we caught deepdiff #410
#      doing exactly this). An unverified repro is not ground truth.
#   3. Most issues ship a repro in the issue body but NOT a committed test.
#      repro: in_issue_body  -> you author tests/test_mechanic_<id>.py from the body
#      repro: existing_test  -> a test in the repo already covers it
#   4. install/test_cmd are best-effort defaults for these repos. Verify each
#      during setup; correct here if wrong. Do not trust them blind.
#
# resolution = patch makes the target failing test pass AND breaks no other test.
# =============================================================================

meta:
  version: 1
  total: 15
  language: python
  scoring: "patch makes failing test(s) pass without regressing the existing suite"
  tiers: {easy: "isolated <20-line fix, deterministic test", medium: "localized but
      multi-line or behavior-sensitive test"}

