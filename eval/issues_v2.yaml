# =============================================================================
# Mechanic — Eval Issue Manifest (v2)
# =============================================================================
# 15 medium-to-difficult bugs across 13 Python libraries.
# Harder than v1: multi-file fixes, algorithmic edge cases, subtle state/ordering
# bugs, numeric precision issues, and API-contract violations.
#
# All 15 issues were confirmed red-on-base with verify.py --manifest eval/issues_v2.yaml.
# Do NOT modify eval/issues.yaml (v1 set) — this is a parallel set.
# =============================================================================

meta:
  version: 2
  total: 15
  language: python
  scoring: "patch makes failing test(s) pass without regressing the existing suite"
  tiers:
    medium: "localized logic fix; bug not immediately obvious from the traceback"
    hard: "multi-function or multi-file fix; requires understanding broader algorithm"

