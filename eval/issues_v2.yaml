  # ---- jmespath ---------------------------------------------------------------
- id: jmespath-318
  repo: jmespath/jmespath.py
  url: https://github.com/jmespath/jmespath.py/issues/318
  issue: 318
  clone: https://github.com/jmespath/jmespath.py.git
  base_commit: 2812594e69d43098ef60f81f4efc404c071b0418
  repro_verified: true
  bug_type: wrong-value
  bug_summary: "jmespath literal list/object expressions (`[]`, `{}`) share the same
    Python object across calls because the compiled AST is cached without deep-copying
    literal nodes; mutating one result corrupts all subsequent searches"
  repro: in_issue_body
  fix_hint: "LiteralExpression.visit() returns the literal value directly from the
    AST node; it must return a deep copy so callers cannot mutate the cached AST"
  fix_size: small
  tier: medium
  test_framework: pytest
  install: "pip install -e ."
  test_cmd: "pytest -q"
  flags: []

