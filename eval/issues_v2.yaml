  # ---- boltons (research) -----------------------------------------------------
- id: boltons-393
  repo: mahmoud/boltons
  url: https://github.com/mahmoud/boltons/issues/393
  issue: 393
  clone: https://github.com/mahmoud/boltons.git
  base_commit: 5aed99eb066f563fbad2231498492df8403a643d
  repro_verified: true
  bug_type: wrong-value
  bug_summary: "boltons.iterutils.research() silently skips branches whose values
    are object-identical (CPython interns small tuples), because the underlying remap()
    caches by object identity and never calls enter() for the second branch"
  repro: in_issue_body
  fix_hint: "remap() uses an identity cache to avoid revisiting objects; research()
    must disable this cache so every branch is visited regardless of identity"
  fix_size: small
  tier: hard
  test_framework: pytest
  install: "pip install -e ."
  test_cmd: "pytest -q"
  flags: []

