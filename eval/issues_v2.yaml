  # ---- arrow (span_range) -----------------------------------------------------
- id: arrow-1185
  repo: arrow-py/arrow
  url: https://github.com/arrow-py/arrow/issues/1185
  issue: 1185
  clone: https://github.com/arrow-py/arrow.git
  base_commit: 2224255c4acc594d734cef0bbc83360452a67983
  repro_verified: true
  bug_type: wrong-value
  bug_summary: "Arrow.span_range('month', …, exact=True) skips up to 3 days when the
    start day-of-month doesn't exist in a later month (e.g. Jan 31 → March)"
  repro: in_issue_body
  fix_hint: "span_range advances the cursor by adding one month each iteration; when
    the day-of-month clamps (Jan 31 + 1 month = Feb 28), the next span wrongly starts
    from the clamped date + 1 month, skipping the missing days"
  fix_size: medium
  tier: hard
  test_framework: pytest
  install: "pip install -e ."
  test_cmd: "pytest -q"
  flags: []

