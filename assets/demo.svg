  <text class="ttl" x="370" y="22" text-anchor="middle">mechanic — solve.py · replay of a real recorded run (furl-163, 14 steps)</text>

  <!-- transcript -->
  <text class="l0" x="22" y="62"><tspan class="grn b">$</tspan> python solve.py --issue furl-163 --verbose</text>

  <text class="l1" x="22" y="82"><tspan class="dim">&#9656; bash    </tspan>pytest test_mechanic_furl_163.py  <tspan class="red b">&#8594; 1 failed</tspan><tspan class="dim">   (red on base &#10007;)</tspan></text>

  <text class="l2" x="22" y="102"><tspan class="dim">&#9656; bash    </tspan>grep -n "split.*@.*1" furl/furl.py</text>
  <text class="l3" x="94" y="122"><tspan class="ylw">furl/furl.py:1509:</tspan>  userpass, netloc = netloc.split('@', 1)</text>

  <text class="l4" x="22" y="142"><tspan class="dim">&#9656; bash    </tspan>sed -n '1500,1520p' furl/furl.py  <tspan class="dim"># read the netloc setter</tspan></text>

  <text class="l5" x="22" y="162"><tspan class="dim">&#9656; edit    </tspan>str_replace furl/furl.py</text>
  <text class="l6" x="94" y="182"><tspan class="red">- userpass, netloc = netloc.split('@', 1)</tspan></text>
  <text class="l7" x="94" y="202"><tspan class="grn">+ userpass, netloc = netloc.rsplit('@', 1)</tspan></text>

  <text class="l8" x="22" y="222"><tspan class="dim">&#9656; bash    </tspan>pytest test_mechanic_furl_163.py  <tspan class="grn b">&#8594; 1 passed &#10003;</tspan></text>

  <text class="l9" x="22" y="242"><tspan class="dim">&#9656; bash    </tspan>git stash &#183; pytest tests/test_furl.py &#183; git stash pop</text>
  <text class="l10" x="94" y="262"><tspan class="dim">suite failure exists on base too — pre-existing, not introduced by this patch</tspan></text>

  <text class="l11" x="22" y="282"><tspan class="dim">&#9656; submit  </tspan>"netloc setter split('@', 1) cuts at the FIRST '@' — userinfo with an</text>
  <text class="l12" x="94" y="302">embedded '@' leaks into the host; rsplit('@', 1) fixes it (RFC 3986)"</text>

  <text class="l13" x="22" y="322"><tspan class="cyn b">&#9656; gate    </tspan>pristine repro re-copied &#183; re-graded <tspan class="grn b">&#8594; PASSED</tspan><tspan class="dim">  (never the model's say-so)</tspan></text>

  <text class="l14" x="22" y="348"><tspan class="grn b">furl-163: RESOLVED &#10003;</tspan>   red &#8594; green   <tspan class="dim">&#183;  14 steps  &#183;  deepseek-chat  &#183;  stop=submitted</tspan></text>
